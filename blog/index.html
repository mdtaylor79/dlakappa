<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>DLA News — DLA Kappa Alpha Psi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>
.blog-wrap { max-width: 1060px; margin: 0 auto; padding: 0 2rem 5rem; }

/* Category filter */
.blog-filters {
  display: flex; flex-wrap: wrap; gap: .5rem;
  margin-bottom: 2.5rem;
}
.filter-btn {
  font-family: 'Cinzel', serif;
  font-size: .6rem; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  padding: .5rem 1.1rem;
  border: 1.5px solid #e0d4c0;
  background: transparent; color: #6a5a52;
  cursor: pointer; transition: all .2s;
}
.filter-btn:hover, .filter-btn.active {
  background: #70110c; color: #f2ebd7; border-color: #70110c;
}

/* Grid */
.blog-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2rem;
}

/* Card */
.blog-card {
  background: #fff;
  border: 1px solid #e4ddd4;
  display: flex; flex-direction: column;
  transition: box-shadow .2s;
  cursor: pointer;
}
.blog-card:hover { box-shadow: 0 4px 24px rgba(0,0,0,.10); }
.blog-card .card-img {
  width: 100%; aspect-ratio: 16/9;
  background: #2a0604;
  overflow: hidden; position: relative;
  flex-shrink: 0;
}
.blog-card .card-img img {
  width: 100%; height: 100%; object-fit: cover;
  object-position: center top; display: block;
}
@media(hover: hover) {
  .blog-card:hover .card-img img { transform: scale(1.04); transition: transform .3s; }
}
.blog-card .card-img .img-placeholder {
  width: 100%; height: 100%;
  background: linear-gradient(135deg, #2a0604 0%, #70110c 100%);
  display: flex; align-items: center; justify-content: center;
}
.blog-card .card-img .img-placeholder img {
  width: 56px; opacity: .18;
}

/* Lock overlay */
.lock-overlay {
  position: absolute; inset: 0;
  background: rgba(28,4,2,.65);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: .5rem;
}
.lock-overlay svg { width: 28px; height: 28px; color: #c69a3f; }
.lock-overlay span {
  font-family: 'Cinzel', serif;
  font-size: .58rem; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: #f2ebd7;
}

/* Category badge */
.card-category {
  font-size: .58rem; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  color: #c69a3f; padding: 1rem 1.25rem .4rem;
}

.card-body { padding: 0 1.25rem 1.5rem; flex: 1; display: flex; flex-direction: column; }
.card-body h2 {
  font-family: 'Cinzel', serif;
  font-size: .95rem; font-weight: 700;
  color: #1a1a1a; line-height: 1.4; margin-bottom: .6rem;
}
.blog-card:hover .card-body h2 { color: #70110c; }
.card-body .excerpt {
  font-size: .84rem; color: #6a5a52; line-height: 1.7;
  flex: 1; margin-bottom: 1rem;
}
.card-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-size: .72rem; color: #aaa;
  border-top: 1px solid #f0ece6; padding-top: .75rem;
}
.card-meta .author { font-weight: 600; color: #8a7a72; }
.read-more {
  font-family: 'Cinzel', serif;
  font-size: .6rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: #70110c; text-decoration: none;
}
.read-more:hover { text-decoration: underline; }
.members-tag {
  font-size: .6rem; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: #c69a3f;
}

/* Loading / empty */
.blog-loading {
  grid-column: 1/-1; text-align: center;
  padding: 4rem 0; color: #aaa;
  font-family: 'Cinzel', serif; font-size: .8rem;
  letter-spacing: .12em; text-transform: uppercase;
}
.blog-empty {
  grid-column: 1/-1; text-align: center; padding: 4rem 0;
  color: #8a7a72; font-size: .9rem;
}

/* Members banner */
.member-banner {
  background: #2a0604; padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .75rem; margin-bottom: 2.5rem;
}
.member-banner p {
  font-size: .82rem; color: #f2ebd7; line-height: 1.5;
}
.member-banner p span { color: #c69a3f; font-weight: 600; }
.member-banner a {
  font-family: 'Cinzel', serif; font-size: .65rem; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase;
  padding: .55rem 1.25rem; background: #c69a3f; color: #2a0604;
  text-decoration: none; white-space: nowrap; transition: background .2s;
}
.member-banner a:hover { background: #b38932; }

@media(max-width:860px){ .blog-grid { grid-template-columns: repeat(2,1fr); } }
@media(max-width:560px){ .blog-grid { grid-template-columns: 1fr; } .blog-wrap { padding: 0 1rem 3rem; } }
</style>
</head>
<body data-page="blog">
<div id="site-nav-placeholder"></div>

<div class="page-hero">
  <div class="wrap">
    <div class="eyebrow">DLA Kappa Alpha Psi</div>
    <h1>DLA News</h1>
    <div class="gold-bar"></div>
    <p>Chapter announcements, event recaps, member spotlights, and community updates.</p>
  </div>
</div>

<div style="background:#fff; padding:3.5rem 0 0;">
  <div class="blog-wrap">

    <!-- Members CTA banner -->
    <div class="member-banner" style="margin-bottom:2.5rem;">
      <p>Members get access to exclusive chapter content. <span>Sign in to the Member Portal</span> to read members-only news and updates.</p>
      <a href="/portal/news.html">Member News &rarr;</a>
    </div>

    <!-- Filters -->
    <div class="blog-filters">
      <button class="filter-btn active" data-cat="all">All Posts</button>
      <button class="filter-btn" data-cat="news">News &amp; Announcements</button>
      <button class="filter-btn" data-cat="chapter-news">Chapter News</button>
      <button class="filter-btn" data-cat="event-recap">Event Recaps</button>
      <button class="filter-btn" data-cat="member-spotlight">Member Spotlights</button>
      <button class="filter-btn" data-cat="guide-right">Guide Right</button>
      <button class="filter-btn" data-cat="chapter-series">Chapter Series</button>
    </div>

    <!-- Grid -->
    <div class="blog-grid" id="blogGrid">
      <div class="blog-loading">Loading posts…</div>
    </div>

  </div>
</div>

<div id="site-footer-placeholder"></div>
<script src="/js/nav.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://eithccduveikejdhvnmq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdGhjY2R1dmVpa2VqZGh2bm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODU4MDYsImV4cCI6MjA5OTg2MTgwNn0.fuqE-f5TjxvN1xuxfJqstnlvVF22VdKkwRLdsGMQcoQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const CATEGORY_LABELS = {
  'news': 'News & Announcements',
  'chapter-news': 'Chapter News',
  'event-recap': 'Event Recap',
  'member-spotlight': 'Member Spotlight',
  'guide-right': 'Guide Right',
  'chapter-series': 'Chapter Series'
};

let allPosts = [];
let activeFilter = 'all';

function formatDate(str) {
  if (!str) return '';
  return new Date(str).toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
}

function wixImgUrl(url) {
  if (!url) return null;
  if (url.includes('wixstatic.com/media') && !url.includes('/v1/')) {
    return url + '/v1/fit/w_800,h_450,al_c,q_80/file.jpg';
  }
  return url;
}

function renderCard(post) {
  const slug = `/blog/post.html?slug=${post.slug}`;
  const cat = CATEGORY_LABELS[post.category] || post.category || '';

  const imgHtml = post.cover_image
    ? `<img src="${wixImgUrl(post.cover_image)}" alt="${post.title}" loading="lazy">`
    : `<div class="img-placeholder"><img src="/img/kappa-crest.png" alt=""></div>`;

  return `
    <div class="blog-card" onclick="window.location.href='${slug}'">
      <div class="card-img">${imgHtml}</div>
      <div class="card-category">${cat}</div>
      <div class="card-body">
        <h2>${post.title}</h2>
        <p class="excerpt">${post.excerpt || ''}</p>
        <div class="card-meta">
          <span class="author">${post.author || 'DLA Chapter'}</span>
          <span>${formatDate(post.published_at)}</span>
        </div>
        <a href="${slug}" class="read-more">Read more &rarr;</a>
      </div>
    </div>`;
}

function renderGrid() {
  const grid = document.getElementById('blogGrid');
  const filtered = activeFilter === 'all' ? allPosts : allPosts.filter(p => p.category === activeFilter);
  if (!filtered.length) {
    grid.innerHTML = '<div class="blog-empty">No posts found in this category yet.</div>';
    return;
  }
  grid.innerHTML = filtered.map(renderCard).join('');
}

async function loadPosts() {
  // Public page — only load posts that are NOT members-only
  const { data: posts, error } = await sb
    .from('posts')
    .select('id, title, slug, excerpt, cover_image, category, author, published_at')
    .eq('published', true)
    .eq('is_members_only', false)
    .order('published_at', { ascending: false });

  if (error) {
    document.getElementById('blogGrid').innerHTML = '<div class="blog-empty">Unable to load posts. Please try again later.</div>';
    return;
  }

  allPosts = posts || [];
  renderGrid();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.cat;
    renderGrid();
  });
});

loadPosts();
</script>
</body>
</html>
