<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>Forgot Password — DLA Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Archivo', sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 360px;
    padding: 2.5rem 2rem 2rem;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,.10);
    text-align: center;
  }
  .card img.crest { width: 72px; margin-bottom: .6rem; }
  .portal-label {
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #70110c;
    margin-bottom: 1.4rem;
  }
  h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; text-align: left; margin-bottom: .6rem; }
  .subtitle { font-size: .84rem; color: #666; text-align: left; margin-bottom: 1.4rem; line-height: 1.5; }
  .field { margin-bottom: 1rem; text-align: left; }
  .field label { display: block; font-size: .78rem; font-weight: 600; color: #444; margin-bottom: .35rem; }
  .field input {
    width: 100%;
    padding: .65rem .8rem;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    background: #f0f0f0;
    font-size: .95rem;
    font-family: 'Archivo', sans-serif;
    color: #222;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: #c69a3f; background: #fff; }
  .error-msg {
    display: none;
    background: #fff0f0;
    border: 1px solid #f0c0c0;
    color: #a00;
    font-size: .82rem;
    padding: .6rem .8rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    text-align: left;
  }
  .success-msg {
    display: none;
    background: #f0fff4;
    border: 1px solid #b2e6c8;
    color: #1a6e3a;
    font-size: .84rem;
    padding: .8rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    text-align: left;
    line-height: 1.5;
  }
  .btn-submit {
    width: 100%;
    padding: .85rem;
    background: #c69a3f;
    color: #2a0604;
    border: none;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    margin-top: .5rem;
    transition: background .2s;
  }
  .btn-submit:hover { background: #b38932; }
  .btn-submit:disabled { background: #d4b96a; cursor: not-allowed; }
  .switch { margin-top: 1.25rem; font-size: .82rem; color: #555; }
  .switch a { color: #70110c; font-weight: 600; text-decoration: none; }
  .switch a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <img class="crest" src="/img/kappa-crest.png" alt="DLA Kappa Crest">
  <div class="portal-label">Member Portal</div>
  <h1>Reset password</h1>
  <p class="subtitle">Enter your email and we'll send you a link to reset your password.</p>
  <div class="error-msg"   id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  <form id="forgotForm" onsubmit="handleReset(event)">
    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" autocomplete="email" required>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Send reset link</button>
  </form>
  <div class="switch"><a href="/portal/login.html">&larr; Back to sign in</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://eithccduveikejdhvnmq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdGhjY2R1dmVpa2VqZGh2bm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODU4MDYsImV4cCI6MjA5OTg2MTgwNn0.fuqE-f5TjxvN1xuxfJqstnlvVF22VdKkwRLdsGMQcoQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

async function handleReset(e) {
  e.preventDefault();
  const email  = document.getElementById('email').value.trim().toLowerCase();
  const errEl  = document.getElementById('errorMsg');
  const succEl = document.getElementById('successMsg');
  const btn    = document.getElementById('submitBtn');

  errEl.style.display = 'none';
  succEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Sending…';

  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://dlakappa.org/portal/reset-password.html'
  });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Send reset link';
  } else {
    document.getElementById('forgotForm').style.display = 'none';
    succEl.innerHTML = '<strong>Check your inbox.</strong> We sent a password reset link to <strong>' + email + '</strong>. The link expires in 1 hour.';
    succEl.style.display = 'block';
  }
}
</script>
</body>
</html>
