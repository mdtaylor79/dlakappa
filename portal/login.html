<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Member Portal Login | Denton-Lewisville Alumni Chapter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

<header class="site-header">
  <nav class="nav">
    <a class="brand" href="../index.html">
      <span class="diamond"></span>
      <span>Denton-Lewisville<br><small>Kappa Alpha Psi Fraternity, Inc.</small></span>
    </a>
  </nav>
</header>

<div class="auth-shell">
  <p class="eyebrow" style="color: var(--crimson);"><span class="diamond"></span> Member Portal</p>
  <h1>Sign in</h1>
  <form id="login-form">
    <div class="form-field">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" required>
    </div>
    <div class="form-field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    <div class="form-status" id="login-status"></div>
  </form>
  <p class="auth-switch">New here? <a href="signup.html">Create a portal account</a></p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/supabase-client.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
