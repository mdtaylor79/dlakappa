<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>Sign In — DLA Member Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Archivo', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: stretch;
  overflow: hidden;
  background: url('/img/log-on_page_background.jpg') center/cover no-repeat fixed;
}

/* ── Left panel ── */
.panel-left {
  position: relative;
  width: 52%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  background: transparent;
}
.panel-left .bg-img { display: none; }
.panel-left .overlay { display: none; }

/* Watermark crest */
.panel-left .watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -55%);
  width: 340px;
  opacity: .12;
  pointer-events: none;
  z-index: 1;
}

/* Brotherhood First */
.panel-left .tagline {
  position: relative;
  z-index: 2;
  padding: 2.5rem 3rem;
  color: #f2ebd7;
}
.panel-left .tagline h2 {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  line-height: 1.15;
}
.panel-left .tagline .gold-line {
  width: 48px;
  height: 2px;
  background: #c69a3f;
  margin: .9rem 0;
}

/* Gold curved divider */
.curve {
  position: absolute;
  right: -2px;
  top: 0;
  bottom: 0;
  width: 80px;
  z-index: 10;
}
.curve svg {
  height: 100%;
  width: 100%;
}

/* ── Right panel ── */
.panel-right {
  flex: 1;
  background: rgba(247,243,238,.88);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  padding: 3rem 2rem;
  position: relative;
  z-index: 5;
}

.motto-block {
  text-align: center;
  padding-top: 1rem;
}
.motto-block .word-achievement {
  font-family: 'Cinzel', serif;
  font-size: clamp(1rem, 2.2vw, 1.45rem);
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #70110c;
}
.motto-block .diamond {
  display: block;
  width: 8px;
  height: 8px;
  background: #c69a3f;
  transform: rotate(45deg);
  margin: .7rem auto;
}
.motto-block .word-field {
  font-family: 'Cinzel', serif;
  font-size: clamp(.85rem, 1.6vw, 1.1rem);
  font-weight: 600;
  letter-spacing: .16em;
  text-transform: uppercase;
  color: #70110c;
  line-height: 1.7;
}
.motto-block .org-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(.65rem, 1.1vw, .78rem);
  letter-spacing: .18em;
  text-transform: uppercase;
  color: #8a7060;
  margin-top: .5rem;
}

/* Footer bar */
.panel-footer {
  display: flex;
  gap: 1.5rem;
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: #8a7060;
  padding-top: 1rem;
}
.panel-footer span {
  display: flex;
  align-items: center;
  gap: .4rem;
}

/* ── Login card ── */
.card-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-38%, -50%);
  z-index: 20;
  width: 100%;
  max-width: 380px;
}
.card {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 8px 48px rgba(0,0,0,.22);
  padding: 2.75rem 2.25rem 2.25rem;
  text-align: center;
}
.card img.crest {
  width: 90px;
  margin-bottom: .5rem;
}
.portal-label {
  font-family: 'Cinzel', serif;
  font-size: .6rem;
  font-weight: 700;
  letter-spacing: .22em;
  text-transform: uppercase;
  color: #70110c;
  margin-bottom: .5rem;
}
.gold-diamond {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: #c69a3f;
  transform: rotate(45deg);
  margin-bottom: 1.25rem;
}
.card h1 {
  font-family: 'Cinzel', serif;
  font-size: 1.55rem;
  font-weight: 700;
  color: #1a1a1a;
  margin-bottom: .35rem;
}
.card .subtitle {
  font-size: .82rem;
  color: #888;
  margin-bottom: 1.6rem;
}
.field { margin-bottom: 1rem; text-align: left; }
.field label { display: block; font-size: .76rem; font-weight: 600; color: #555; margin-bottom: .3rem; }
.input-wrap {
  position: relative;
}
.input-wrap svg {
  position: absolute;
  left: .75rem;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: #aaa;
  pointer-events: none;
}
.input-wrap input {
  width: 100%;
  padding: .68rem .8rem .68rem 2.25rem;
  border: 1.5px solid #e0e0e0;
  border-radius: 4px;
  background: #fafafa;
  font-size: .92rem;
  font-family: 'Archivo', sans-serif;
  color: #222;
  outline: none;
  transition: border-color .2s, background .2s;
}
.input-wrap input:focus { border-color: #c69a3f; background: #fff; }
.field-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: .3rem;
}
.field-row label { margin: 0; }
.forgot-link { font-size: .74rem; color: #70110c; text-decoration: none; font-weight: 600; }
.forgot-link:hover { text-decoration: underline; }

/* Remember me */
.remember-row {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin: .25rem 0 1rem;
  text-align: left;
}
.remember-row input[type="checkbox"] {
  width: 15px;
  height: 15px;
  accent-color: #70110c;
  cursor: pointer;
}
.remember-row label {
  font-size: .78rem;
  color: #555;
  cursor: pointer;
}

.error-msg {
  display: none;
  background: #fff0f0;
  border: 1px solid #f0c0c0;
  color: #a00;
  font-size: .8rem;
  padding: .55rem .75rem;
  border-radius: 4px;
  margin-bottom: .9rem;
  text-align: left;
}
.btn-submit {
  width: 100%;
  padding: .9rem;
  background: #70110c;
  color: #f2ebd7;
  border: none;
  border-radius: 4px;
  font-family: 'Cinzel', serif;
  font-size: .85rem;
  font-weight: 700;
  letter-spacing: .14em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background .2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
}
.btn-submit:hover { background: #5a0e09; }
.btn-submit:disabled { background: #a55; cursor: not-allowed; }

.divider {
  display: flex; align-items: center; gap: .75rem;
  margin: 1.1rem 0; color: #ccc; font-size: .76rem;
}
.divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #ebebeb; }

.invite-note {
  display: flex;
  align-items: flex-start;
  gap: .6rem;
  text-align: left;
  background: #faf8f4;
  border: 1px solid #e8e0d4;
  border-radius: 4px;
  padding: .75rem .9rem;
}
.invite-note svg { width: 18px; height: 18px; flex-shrink: 0; color: #c69a3f; margin-top: 1px; }
.invite-note p { font-size: .78rem; color: #666; line-height: 1.5; }
.invite-note strong { color: #3a2e28; }

/* ── Back link ── */
.back-link {
  position: fixed;
  top: 1rem;
  left: 1.25rem;
  font-size: .76rem;
  font-weight: 600;
  color: #f2ebd7;
  text-decoration: none;
  letter-spacing: .05em;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: .3rem;
}
.back-link:hover { text-decoration: underline; }

/* ── Mobile ── */
@media(max-width:700px){
  body { flex-direction: column; overflow: auto; }
  .panel-left { width: 100%; min-height: 200px; }
  .panel-left .watermark { width: 180px; }
  .curve { display: none; }
  .panel-right { display: none; }
  .card-wrap {
    position: static;
    transform: none;
    max-width: 100%;
    padding: 1.5rem 1rem 2rem;
  }
}
</style>
</head>
<body>

<a class="back-link" href="/">&#8592; Home</a>

<!-- Left panel -->
<div class="panel-left">
  <div class="bg-img"></div>
  <div class="overlay"></div>
  <div class="tagline">
    <div class="gold-line"></div>
    <h2>Brotherhood<br>First</h2>
  </div>

  <!-- Gold curve -->
  <div class="curve">
    <svg viewBox="0 0 80 900" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M80,0 C40,225 40,675 80,900 L80,900 L0,900 L0,0 Z" fill="#f7f3ee"/>
      <path d="M80,0 C40,225 40,675 80,900" fill="none" stroke="#c69a3f" stroke-width="2"/>
    </svg>
  </div>
</div>

<!-- Right panel -->
<div class="panel-right">
  <div class="panel-footer">
    <span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      Secure Access
    </span>
    <span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Confidential
    </span>
    <span>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Brotherhood
    </span>
  </div>
</div>

<!-- Login card (overlaps both panels) -->
<div class="card-wrap">
  <div class="card">
    <img class="crest" src="/img/kappa-crest.png" alt="DLA Kappa Crest">
    <div class="portal-label">Member Portal</div>
    <div class="gold-diamond"></div>
    <h1>Welcome Back</h1>
    <p class="subtitle">Sign in to access your member portal</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="email" autocomplete="email" placeholder="your@email.com" required>
        </div>
      </div>
      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a class="forgot-link" href="/portal/forgot-password.html">Forgot password?</a>
        </div>
        <div class="input-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
        </div>
      </div>
      <div class="remember-row">
        <input type="checkbox" id="remember">
        <label for="remember">Remember me</label>
      </div>
      <button type="submit" class="btn-submit" id="submitBtn">
        Sign In
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </form>

    <div class="divider">or</div>

    <div class="invite-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <p><strong>Access is by invitation only.</strong><br>Contact your chapter administrator for access.<br><a href="mailto:webmaster@dlakappa.org" style="color:#70110c;font-weight:600;text-decoration:none;">webmaster@dlakappa.org</a></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://eithccduveikejdhvnmq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdGhjY2R1dmVpa2VqZGh2bm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODU4MDYsImV4cCI6MjA5OTg2MTgwNn0.fuqE-f5TjxvN1xuxfJqstnlvVF22VdKkwRLdsGMQcoQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/portal/dashboard.html';
})();

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('submitBtn');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Invalid email or password. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = 'Sign In <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
  } else {
    window.location.href = '/portal/dashboard.html';
  }
}
</script>
</body>
</html>
