<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>Sign In — DLA Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Archivo', sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 360px;
    padding: 2.5rem 2rem 2rem;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,.10);
    text-align: center;
  }
  .card img.crest { width: 72px; margin-bottom: .6rem; }
  .portal-label {
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #70110c;
    margin-bottom: 1.4rem;
  }
  h1 {
    font-size: 1.65rem;
    font-weight: 700;
    color: #1a1a1a;
    text-align: left;
    margin-bottom: 1.4rem;
  }
  .field { margin-bottom: 1rem; text-align: left; }
  .field label {
    display: block;
    font-size: .78rem;
    font-weight: 600;
    color: #444;
    margin-bottom: .35rem;
  }
  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: .35rem;
  }
  .field-row label { font-size: .78rem; font-weight: 600; color: #444; margin: 0; }
  .forgot-link {
    font-size: .75rem;
    color: #70110c;
    text-decoration: none;
    font-weight: 600;
  }
  .forgot-link:hover { text-decoration: underline; }
  .field input {
    width: 100%;
    padding: .65rem .8rem;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    background: #f0f0f0;
    font-size: .95rem;
    font-family: 'Archivo', sans-serif;
    color: #222;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: #c69a3f; background: #fff; }
  .error-msg {
    display: none;
    background: #fff0f0;
    border: 1px solid #f0c0c0;
    color: #a00;
    font-size: .82rem;
    padding: .6rem .8rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    text-align: left;
  }
  .btn-submit {
    width: 100%;
    padding: .85rem;
    background: #c69a3f;
    color: #2a0604;
    border: none;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    margin-top: .5rem;
    transition: background .2s;
  }
  .btn-submit:hover { background: #b38932; }
  .btn-submit:disabled { background: #d4b96a; cursor: not-allowed; }
  .switch { margin-top: 1.25rem; font-size: .82rem; color: #555; }
  .switch a { color: #70110c; font-weight: 600; text-decoration: none; }
  .switch a:hover { text-decoration: underline; }
  .divider {
    display: flex; align-items: center; gap: .75rem;
    margin: 1.25rem 0; color: #aaa; font-size: .78rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: #e0e0e0;
  }
  .btn-google {
    width: 100%; padding: .72rem;
    background: #fff; color: #333;
    border: 1.5px solid #ddd; border-radius: 4px;
    font-family: 'Archivo', sans-serif;
    font-size: .88rem; font-weight: 600;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: .6rem;
    transition: background .2s, border-color .2s;
  }
  .btn-google:hover { background: #f8f8f8; border-color: #bbb; }
  .btn-google svg { width: 18px; height: 18px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="card">
  <img class="crest" src="/img/kappa-crest.png" alt="DLA Kappa Crest">
  <div class="portal-label">Member Portal</div>
  <h1>Sign in</h1>
  <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>
  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" autocomplete="email" required>
    </div>
    <div class="field">
      <div class="field-row">
        <label for="password">Password</label>
        <a class="forgot-link" href="/portal/forgot-password.html">Forgot password?</a>
      </div>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Sign in</button>
  </form>

  <div class="divider">or</div>

  <button class="btn-google" onclick="signInWithGoogle()">
    <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Continue with Google
  </button>

  <div class="switch">New here? <a href="/portal/signup.html">Create a portal account</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://eithccduveikejdhvnmq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdGhjY2R1dmVpa2VqZGh2bm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODU4MDYsImV4cCI6MjA5OTg2MTgwNn0.fuqE-f5TjxvN1xuxfJqstnlvVF22VdKkwRLdsGMQcoQ';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) window.location.href = '/portal/dashboard.html';
})();

async function signInWithGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://dlakappa.org/portal/dashboard.html' }
  });
}

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('email').value.trim().toLowerCase();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('submitBtn');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errEl.textContent = 'Invalid email or password. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  } else {
    window.location.href = '/portal/dashboard.html';
  }
}
</script>
</body>
</html>
