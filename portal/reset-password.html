<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.png" type="image/png">
<title>Set New Password — DLA Member Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Archivo:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Archivo', sans-serif;
    background: #f4f4f4;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .card {
    background: #fff;
    width: 100%;
    max-width: 360px;
    padding: 2.5rem 2rem 2rem;
    border-radius: 4px;
    box-shadow: 0 2px 16px rgba(0,0,0,.10);
    text-align: center;
  }
  .card img.crest { width: 72px; margin-bottom: .6rem; }
  .portal-label {
    font-family: 'Cinzel', serif;
    font-size: .65rem;
    font-weight: 700;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: #70110c;
    margin-bottom: 1.4rem;
  }
  h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a1a; text-align: left; margin-bottom: .6rem; }
  .subtitle { font-size: .84rem; color: #666; text-align: left; margin-bottom: 1.4rem; line-height: 1.5; }
  .field { margin-bottom: 1rem; text-align: left; }
  .field label { display: block; font-size: .78rem; font-weight: 600; color: #444; margin-bottom: .35rem; }
  .field input {
    width: 100%;
    padding: .65rem .8rem;
    border: 1.5px solid #ddd;
    border-radius: 4px;
    background: #f0f0f0;
    font-size: .95rem;
    font-family: 'Archivo', sans-serif;
    color: #222;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-color: #c69a3f; background: #fff; }
  .hint { font-size: .75rem; color: #999; margin-top: .3rem; text-align: left; }
  .error-msg {
    display: none;
    background: #fff0f0;
    border: 1px solid #f0c0c0;
    color: #a00;
    font-size: .82rem;
    padding: .6rem .8rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    text-align: left;
  }
  .loading-msg {
    font-size: .88rem;
    color: #666;
    padding: 1rem 0;
    text-align: left;
  }
  .btn-submit {
    width: 100%;
    padding: .85rem;
    background: #c69a3f;
    color: #2a0604;
    border: none;
    border-radius: 4px;
    font-family: 'Cinzel', serif;
    font-size: .88rem;
    font-weight: 700;
    letter-spacing: .06em;
    cursor: pointer;
    margin-top: .5rem;
    transition: background .2s;
  }
  .btn-submit:hover { background: #b38932; }
  .btn-submit:disabled { background: #d4b96a; cursor: not-allowed; }
  .switch { margin-top: 1.25rem; font-size: .82rem; color: #555; }
  .switch a { color: #70110c; font-weight: 600; text-decoration: none; }
  .switch a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  <img class="crest" src="/img/kappa-crest.png" alt="DLA Kappa Crest">
  <div class="portal-label">Member Portal</div>
  <h1>Set new password</h1>
  <p class="subtitle">Choose a strong new password for your account.</p>

  <div class="loading-msg" id="loadingMsg">Verifying reset link…</div>
  <div class="error-msg" id="errorMsg"></div>

  <form id="resetForm" style="display:none" onsubmit="handleSetPassword(event)">
    <div class="field">
      <label for="password">New password</label>
      <input type="password" id="password" autocomplete="new-password" minlength="6" required>
      <div class="hint">At least 6 characters</div>
    </div>
    <div class="field">
      <label for="confirm">Confirm new password</label>
      <input type="password" id="confirm" autocomplete="new-password" minlength="6" required>
    </div>
    <button type="submit" class="btn-submit" id="submitBtn">Update password</button>
  </form>

  <div class="switch" id="backLink" style="display:none"><a href="/portal/login.html">&larr; Back to sign in</a></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── SUPABASE CONFIG ──────────────────────────────
const SUPABASE_URL  = 'https://eithccduveikejdhvnmq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVpdGhjY2R1dmVpa2VqZGh2bm1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODU4MDYsImV4cCI6MjA5OTg2MTgwNn0.fuqE-f5TjxvN1xuxfJqstnlvVF22VdKkwRLdsGMQcoQ';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
</script>
<script>
// Supabase fires PASSWORD_RECOVERY when the user lands here via a reset link
supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('resetForm').style.display = 'block';
    document.getElementById('backLink').style.display  = 'block';
  }
});

// Fallback: if token already in hash/query (page reload)
(async () => {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    // Check if this session came from a recovery token
    // (Supabase sets amr claim)
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('resetForm').style.display = 'block';
    document.getElementById('backLink').style.display  = 'block';
  } else {
    // No recovery token — show error after short delay
    setTimeout(() => {
      const errEl = document.getElementById('errorMsg');
      if (document.getElementById('resetForm').style.display === 'none') {
        document.getElementById('loadingMsg').style.display = 'none';
        errEl.textContent = 'This reset link is invalid or has expired. Please request a new one.';
        errEl.style.display = 'block';
        document.getElementById('backLink').style.display = 'block';
      }
    }, 3000);
  }
})();

async function handleSetPassword(e) {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;
  const errEl    = document.getElementById('errorMsg');
  const btn      = document.getElementById('submitBtn');

  errEl.style.display = 'none';

  if (password !== confirm) {
    errEl.textContent = 'Passwords do not match.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  const { error } = await supabase.auth.updateUser({ password });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Update password';
  } else {
    // Sign out so they log in fresh, then go to membership page
    await supabase.auth.signOut();
    window.location.href = '/membership.html';
  }
}
</script>
</body>
</html>
